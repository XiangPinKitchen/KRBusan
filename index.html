<html lang="zh-TW"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇰🇷 釜山旅遊管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&amp;family=DM+Mono:wght@400;500&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════
   🎨 顏色系統 — 修改這裡就能換整個 App 的配色
   ════════════════════════════════════════════════════
   提示：只需改 :root 內的值，所有地方自動更新
   ════════════════════════════════════════════════════ */
:root {
  --bg:       #F5F6FA;   /* 頁面背景色 */
  --surface:  #FFFFFF;   /* 卡片底色 */
  --border:   #E2E6F0;   /* 邊框顏色 */
  --text:     #1A1F36;   /* 主要文字 */
  --text2:    #4A5568;   /* 次要文字 */
  --text3:    #8A93A8;   /* 淡色提示文字 */

  /* 主題色 */
  --teal:     #0ABFA3;
  --teal-lt:  #E8FBF8;
  --teal-bd:  #9FEDE4;

  /* 狀態色（格式：顏色 / 淡底色 / 邊框色） */
  --red:      #FF6B6B;  --red-lt:   #FFF0F0;  --red-bd:   #FFCECE;
  --gold:     #F59E0B;  --gold-lt:  #FFFBEB;  --gold-bd:  #FDE68A;
  --rose:     #F472B6;  --rose-lt:  #FDF2F8;  --rose-bd:  #FBCFE8;
  --violet:   #8B5CF6;  --violet-lt:#F5F3FF;  --violet-bd:#DDD6FE;
  --green:    #10B981;  --green-lt: #ECFDF5;  --green-bd: #A7F3D0;
  --orange:   #F97316;  --orange-lt:#FFF7ED;  --orange-bd:#FED7AA;
  --blue:     #3B82F6;  --blue-lt:  #EFF6FF;  --blue-bd:  #BFDBFE;

  --shadow-sm: 0 1px 3px rgba(26,31,54,.06),0 1px 2px rgba(26,31,54,.04);
  --shadow:    0 4px 12px rgba(26,31,54,.08),0 2px 4px rgba(26,31,54,.04);
  --shadow-lg: 0 20px 48px rgba(26,31,54,.14),0 8px 16px rgba(26,31,54,.08);
}

/* ════ 全域重設 ════ */
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overscroll-behavior: none; margin: 0; }

/* ════ 排版工具 ════ */
.flex        { display: flex; }
.flex-col    { flex-direction: column; }
.flex-wrap   { flex-wrap: wrap; }
.items-start { align-items: flex-start; }
.items-end   { align-items: flex-end; }
.items-center{ align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1  { gap: 0.25rem; }
.gap-2  { gap: 0.5rem; }
.gap-3  { gap: 0.75rem; }
.flex-1 { flex: 1; }
.mb-2   { margin-bottom: 0.5rem; }
.mb-3   { margin-bottom: 0.75rem; }
.mb-4   { margin-bottom: 1rem; }
.mt-1   { margin-top: 0.25rem; }
.mt-3   { margin-top: 0.75rem; }
.pt-1   { padding-top: 0.25rem; }
.pt-2   { padding-top: 0.5rem; }
.pb-1   { padding-bottom: 0.25rem; }
.w-full { width: 100%; }
.overflow-x-auto { overflow-x: auto; }
.px-3   { padding-left: 0.75rem; padding-right: 0.75rem; }
.px-4   { padding-left: 1rem; padding-right: 1rem; }
.pb-28  { padding-bottom: 7rem; }

/* ════ Header ════ */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  position: sticky; top: 0; z-index: 50;
}
.app-header > div { padding: 16px 16px 12px; }

/* ════ 倒數計時列 ════ */
.cd-bar { height: 5px; border-radius: 3px; background: var(--border); overflow: hidden; margin-top: 6px; }
.cd-fill { height: 100%; border-radius: 3px; background: var(--green); transition: background .5s, width 1s linear; }
.cd-fill.yellow { background: var(--gold); }
.cd-fill.red    { background: var(--red); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.cd-digits { font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 500; letter-spacing: 1px; color: var(--text); }

/* ════ 日期 Tabs ════ */
.day-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  padding: 6px 13px; border-radius: 20px; font-size: .73rem; font-weight: 700;
  cursor: pointer; white-space: nowrap; border: 1.5px solid var(--border);
  color: var(--text2); background: var(--surface); transition: all .18s;
  font-family: 'Noto Sans TC', sans-serif;
}
.day-tab:hover  { border-color: var(--teal); color: var(--teal); background: var(--teal-lt); }
.day-tab.active { background: var(--teal); color: #fff; border-color: var(--teal); box-shadow: 0 4px 12px rgba(10,191,163,.3); font-weight: 800; }

/* ════ 日期標題卡 ════ */
.day-hdr {
  background: linear-gradient(135deg, #0ABFA3, #0891B2);
  border-radius: 12px; padding: 8px 14px; margin-bottom: 10px;
  color: #fff; box-shadow: 0 4px 14px rgba(10,191,163,.2);
}

/* ════ 時段分隔線 ════ */
.period-hdr {
  font-size: .66rem; font-weight: 800; letter-spacing: 2px; color: var(--text3);
  padding: 13px 2px 5px; display: flex; align-items: center; gap: 8px;
}
.period-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ════ 行程卡片 ════ */
.trip-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  /* padding-bottom 由 JS 依內容決定：有底部按鈕=40px，否則=20px */
  padding: 13px 13px 20px;
  margin-bottom: 8px;
  box-shadow: var(--shadow-sm);
  transition: all .2s;
  position: relative;
  animation: cardIn .22s ease both;
}
/* 當卡片有底部按鈕時加大底部空間 */
.trip-card.has-bottom { padding-bottom: 40px; }
.trip-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; border-radius: 14px 0 0 14px; background: var(--border);
}
.trip-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); border-color: #C8D0E4; }

/* 當前行程高亮 */
.trip-card.now {
  border-color: var(--gold) !important;
  background: var(--gold-lt) !important;
  box-shadow: 0 0 0 3px rgba(245,158,11,.15), var(--shadow) !important;
}
.trip-card.now::after {
  content: '▶ 現在'; position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
  background: var(--gold); color: #fff; font-size: .58rem; font-weight: 800;
  padding: 2px 10px; border-radius: 0 0 8px 8px;
}

/* 狀態色（左邊框 + 背景）*/
.c-urgent   { border-color: var(--red-bd)    !important; background: var(--red-lt)    !important; } .c-urgent::before   { background: var(--red); }
.c-booked   { border-color: var(--teal-bd)   !important; background: var(--teal-lt)   !important; } .c-booked::before   { background: var(--teal); }
.c-reserved { border-color: var(--gold-bd)   !important; background: var(--gold-lt)   !important; } .c-reserved::before { background: var(--gold); }
.c-walkin   { border-color: var(--rose-bd)   !important; background: var(--rose-lt)   !important; } .c-walkin::before   { background: var(--rose); }
.c-catchtable{ border-color: var(--orange-bd)!important; background: var(--orange-lt) !important; } .c-catchtable::before{ background: var(--orange); }
.c-naver    { border-color: var(--green-bd)  !important; background: var(--green-lt)  !important; } .c-naver::before    { background: var(--green); }

/* ════════════════════════════════════════════════════════════
   🏷️ 行程類別標籤顏色
   ════════════════════════════════════════════════════════════
   ✅ 如何新增一個類別（以「購物」為例）：
   ─────────────────────────────────────────────────────────
   步驟 1：在下方加一行  .c-新類別名{ background: 底色; color: 文字色; }
           類別名必須和 JS 裡 CATS 陣列的字串完全一致
   步驟 2：到 JS 的 CATS 陣列加入該類別名（約在第 2345 行）
   ─────────────────────────────────────────────────────────
   顏色挑選小技巧：用淡底色 + 深同色系文字，視覺最清晰
     淡藍底 + 深藍字：background:#DBEAFE; color:#1D4ED8;
     淡黃底 + 深棕字：background:#FEF3C7; color:#B45309;
     淡綠底 + 深綠字：background:#D1FAE5; color:#065F46;
   ════════════════════════════════════════════════════════════ */
.cat-badge  { font-size: .63rem; padding: 2px 7px; border-radius: 10px; font-weight: 700; letter-spacing: .3px; }
.c-集合出發 { background: #FEE2E2; color: #DC2626; }   /* 🔴 紅   */
.c-景點     { background: #DBEAFE; color: #1D4ED8; }   /* 🔵 藍   */
.c-購物     { background: #F3E8FF; color: #7E22CE; }   /* 🟣 紫   */
.c-餐廳     { background: #FFEDD5; color: #C2410C; }   /* 🟠 橙   */
.c-點心     { background: #FCE7F3; color: #BE185D; }   /* 🩷 粉   */
.c-交通     { background: #CFFAFE; color: #0E7490; }   /* 🩵 青   */
.c-住宿     { background: #D1FAE5; color: #065F46; }   /* 🟢 綠   */
/* ↓ 要新增類別就在這裡加一行，格式同上 ↓ */

/* ════════════════════════════════════════════════════════════
   🔴 狀態徽章顏色（卡片右上角小標籤）
   ════════════════════════════════════════════════════════════
   顏色來自 :root 變數，修改 :root 裡的值就會同步更新
   如需新增狀態標籤，同時要更新 JS 的 STATUSES 陣列 和 CC_MAP / SBC_MAP
   ════════════════════════════════════════════════════════════ */
.sb            { font-size: .59rem; padding: 2.5px 7px; border-radius: 10px; font-weight: 800; }
.sb-urgent     { background: var(--red);    color: #fff; }   /* 重要！勿遲到 */
.sb-booked     { background: var(--teal);   color: #fff; }   /* 已預約 */
.sb-reserved   { background: var(--gold);   color: #fff; }   /* 需提前預約 */
.sb-walkin     { background: var(--rose);   color: #fff; }   /* 現場劃位 */
.sb-catchtable { background: var(--orange); color: #fff; }   /* Catchtable 預訂 */
.sb-naver      { background: var(--green);  color: #fff; }   /* NAVER 預訂 */

/* 時間標籤 */
.time-chip {
  font-family: 'DM Mono', monospace; font-size: .68rem; font-weight: 500;
  color: var(--gold); background: var(--gold-lt);
  padding: 2px 7px; border-radius: 7px; border: 1px solid var(--gold-bd);
}

/* ════ 地圖導航按鈕 ════ */
.map-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 8px; font-size: .68rem; font-weight: 700;
  border: 1.5px solid; text-decoration: none; transition: all .15s;
  cursor: pointer; white-space: nowrap;
}
.map-btn-naver  { background: #03C75A1A; color: #03C75A; border-color: #03C75A55; }
.map-btn-naver:hover  { background: #03C75A; color: #fff; }
.map-btn-google { background: #4285F41A; color: #4285F4; border-color: #4285F455; }
.map-btn-google:hover { background: #4285F4; color: #fff; }

/* ════ 齒輪按鈕 ════ */
.gear-btn {
  width: 34px; height: 34px; background: #F5F6FA; border: 1.5px solid var(--border);
  border-radius: 9px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .18s; font-size: .95rem; color: var(--text2);
}
.gear-btn:hover { transform: rotate(45deg); }
.gear-btn.on    { background: var(--violet-lt); border-color: var(--violet-bd); color: var(--violet); }

/* ════ 管理員工具列 ════ */
.admin-bar {
  background: var(--violet-lt); border: 1.5px solid var(--violet-bd); border-radius: 12px;
  padding: 10px 14px; margin: 0 12px 10px;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}

/* ════ 通用按鈕 ════ */
.btn {
  padding: 8px 15px; border-radius: 10px; font-size: .78rem; font-weight: 700;
  cursor: pointer; transition: all .18s; border: none;
  font-family: 'Noto Sans TC', sans-serif;
  display: inline-flex; align-items: center; gap: 5px;
}
.btn-teal   { background: var(--teal);   color: #fff; box-shadow: 0 4px 12px rgba(10,191,163,.25); }
.btn-teal:hover   { background: #09A58E; }
.btn-red    { background: var(--red);    color: #fff; }
.btn-red:hover    { background: #E85555; }
.btn-gold   { background: var(--gold);   color: #fff; }
.btn-gold:hover   { background: #D97706; }
.btn-ghost  { background: #F5F6FA; color: var(--text2); border: 1.5px solid var(--border); }
.btn-ghost:hover  { background: var(--border); color: var(--text); }
.btn-violet { background: var(--violet); color: #fff; }
.btn-sm { padding: 5px 11px; font-size: .71rem; border-radius: 8px; }
.btn-xs { padding: 4px 9px;  font-size: .63rem; border-radius: 7px; }

/* ════ Modal ════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(26,31,54,.4);
  backdrop-filter: blur(5px); z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn .2s ease;
}
@media (min-width: 640px) { .modal-overlay { align-items: center; } }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal-box {
  background: var(--surface); border-radius: 22px 22px 0 0;
  padding: 16px 16px 100px; width: 100%; max-width: 520px;
  max-height: 88vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp .25s cubic-bezier(.34,1.56,.64,1);
}
@media (min-width: 640px) { .modal-box { border-radius: 18px; padding: 26px 22px; } }
@keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-handle { width: 34px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 18px; }

/* ════ 表單樣式 ════ */
.form-label {
  font-size: .7rem; font-weight: 800; color: var(--text2);
  margin-bottom: 4px; display: block; letter-spacing: .3px;
}
.form-input {
  background: #F5F6FA; border: 1.5px solid var(--border); border-radius: 10px;
  color: var(--text); padding: 9px 12px; font-size: .83rem;
  font-family: 'Noto Sans TC', sans-serif; width: 100%; transition: all .18s;
}
.form-input:focus {
  outline: none; border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(10,191,163,.12); background: #fff;
}
.form-select {
  background: #F5F6FA; border: 1.5px solid var(--border); border-radius: 10px;
  color: var(--text); padding: 9px 12px; font-size: .83rem;
  font-family: 'Noto Sans TC', sans-serif; width: 100%;
}
.form-select:focus { outline: none; border-color: var(--teal); }

/* ════ 費用卡片 ════ */
.exp-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 15px; margin-bottom: 9px; box-shadow: var(--shadow-sm);
}

/* ════ VBP 抽屜 ════ */
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(26,31,54,.3);
  backdrop-filter: blur(4px); z-index: 150; animation: fadeIn .2s ease;
}
.drawer {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: min(100vw, 420px); background: var(--surface);
  box-shadow: var(--shadow-lg); z-index: 151;
  display: flex; flex-direction: column;
  animation: slideRight .25s cubic-bezier(.34,1.2,.64,1);
}
@keyframes slideRight { from{transform:translateX(100%)} to{transform:translateX(0)} }
.drawer-hdr { padding: 18px 18px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.drawer-body { flex: 1; overflow-y: auto; padding: 10px 14px 100px; }

/* ════ VBP 卡片 ════ */
.vbp-card {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px;
  padding: 12px 13px; margin-bottom: 7px; box-shadow: var(--shadow-sm);
  transition: all .18s; animation: cardIn .22s ease both;
}
.vbp-card:hover { box-shadow: var(--shadow); border-color: #C8D0E4; }
.vbp-area-hdr {
  font-size: .72rem; font-weight: 800; letter-spacing: 2px; color: var(--text3);
  padding: 13px 2px 7px; display: flex; align-items: center; gap: 8px;
}
.vbp-area-hdr::after { content: ''; flex: 1; height: 1.5px; background: var(--border); }
.tier { font-size: .57rem; padding: 2px 6px; border-radius: 7px; font-weight: 800; }
.tier-free   { background: #D1FAE5; color: #065F46; }
.tier-blue   { background: #DBEAFE; color: #1D4ED8; }
.tier-purple { background: #EDE9FE; color: #5B21B6; }

/* ════ 篩選 Tabs ════ */
.ftab {
  padding: 5px 11px; border-radius: 16px; font-size: .7rem; font-weight: 700;
  cursor: pointer; transition: all .15s;
  border: 1.5px solid var(--border); color: var(--text2); background: var(--surface); white-space: nowrap;
}
.ftab:hover { border-color: var(--teal); color: var(--teal); }
.ftab.active { background: var(--teal); color: #fff; border-color: var(--teal); }

/* ════ 底部導覽列 ════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,.96); border-top: 1px solid var(--border);
  backdrop-filter: blur(15px); z-index: 100;
  display: flex; padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 0px));
  box-shadow: 0 -4px 20px rgba(26,31,54,.07);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 5px 3px; cursor: pointer; transition: all .18s;
  color: var(--text3); font-size: .56rem; font-weight: 800; letter-spacing: .5px;
  background: none; border: none; font-family: 'Noto Sans TC', sans-serif;
}
.nav-btn:hover, .nav-btn.active { color: var(--teal); }
.nav-icon-wrap { padding: 4px 12px; border-radius: 10px; transition: all .18s; }
.nav-btn.active .nav-icon-wrap { background: var(--teal-lt); }
.nav-icon { font-size: 1.12rem; display: block; }

/* ════ Toast 提示 ════ */
.toast {
  position: fixed; bottom: 88px; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: var(--text); color: #fff; padding: 10px 18px;
  border-radius: 12px; font-size: .8rem; font-weight: 700;
  z-index: 9999; opacity: 0;
  transition: all .25s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; box-shadow: var(--shadow);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ════ 匯率換算 ════ */
.fx-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 18px; margin-bottom: 10px; box-shadow: var(--shadow-sm);
}
.fx-display { font-family: 'DM Mono', monospace; font-size: 2rem; font-weight: 500; color: var(--teal); letter-spacing: 1px; }
.fx-quick-btn {
  padding: 7px 14px; border-radius: 10px; font-size: .75rem; font-weight: 700;
  border: 1.5px solid var(--border); background: var(--surface); color: var(--text2);
  cursor: pointer; transition: all .15s;
}
.fx-quick-btn:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-lt); }
.fx-quick-btn.active-fx { background: var(--teal); color: #fff; border-color: var(--teal); }

/* ════ 離線資訊 ════ */
.info-section {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow-sm);
}
.info-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.info-row:last-child { border-bottom: none; }
.phrase-ko  { font-size: .8rem; font-weight: 700; color: var(--text); line-height: 1.3; }
.phrase-zh  { font-size: .7rem; color: var(--text2); }
.phrase-ro  { font-size: .67rem; color: var(--text3); font-style: italic; }

/* ════ 動畫 ════ */
@keyframes cardIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ════════════════════════════════════════════════════════════
   🔘 狀態 Chip 多選按鈕樣式（Modal 編輯行程時出現）
   ════════════════════════════════════════════════════════════

/* 取得陣列狀態中第一個有卡片顏色的 CSS class（決定左邊框顏色） */
function getCardClass(statusArr) {
  if (!Array.isArray(statusArr)) return CC_MAP[statusArr] || '';
  for (const s of statusArr) { if (CC_MAP[s]) return CC_MAP[s]; }
  return '';
}

/* 渲染狀態多選 Chip（共用於新增 & 編輯 Modal）
   containerId = 放 chips 的容器 id
   selected    = 目前已選的狀態陣列 */
function renderStatusChips(containerId, selected) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;
  wrap.innerHTML = STATUSES.map(s => {
    const isSelected = selected.includes(s);
    return `<span class="status-chip${isSelected ? ' selected' : ''}" data-s="${s}"
      onclick="toggleChip(this,'${containerId}')">${s}</span>`;
  }).join('');
  updateBookingFieldFromChips();
}

/* 切換單一 chip 的選中狀態 */
function toggleChip(el, containerId) {
  el.classList.toggle('selected');
  updateBookingFieldFromChips();
}

/* 從 chip 容器讀取目前已選的狀態陣列 */
function getSelectedStatuses(containerId) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return [];
  return [...wrap.querySelectorAll('.status-chip.selected')].map(el => el.dataset.s);
}

/* 依選中的 chips 顯示/隱藏預訂網址欄位 */
function updateBookingFieldFromChips() {
  const selected = getSelectedStatuses('statusChips');
  const wrap = document.getElementById('eBookingWrap');
  if (wrap) wrap.style.display = (selected.includes('Catchtable 預訂') || selected.includes('NAVER 預訂')) ? 'block' : 'none';
}

// ── Header 渲染 ──
function renderHeader() {

  document.getElementById('hdrBadges').innerHTML = `
    <span style="background:var(--teal-lt);border:1px solid var(--teal-bd);border-radius:20px;padding:2px 10px;font-size:.67rem;color:var(--teal);font-weight:700">
      ${TRIP_META.dateRange} · ${TRIP_META.duration}
    </span>`;

// ── 初始化 ──
function init() {
  // 從 localStorage 讀取行程，若無則用原始資料深拷貝
  const sd = localStorage.getItem('bs_days');
  tripDays = sd ? JSON.parse(sd) : JSON.parse(JSON.stringify(TRIP_DAYS));

  const se = localStorage.getItem('bs_exp');
  expenses = se ? JSON.parse(se) : JSON.parse(JSON.stringify(DEFAULT_EXPENSES));

  // 資料遷移（修正舊快取中的過期欄位值）
  let migrated = false;
  tripDays.forEach(d => d.items.forEach(it => {
    if (it.period === '早上')       { it.period = '上午';       migrated = true; }
    if (it.status === '重要!勿遲到') { it.status = '重要！勿遲到'; migrated = true; }
    // 【遷移】status 由舊的字串格式升級為陣列格式
    if (typeof it.status === 'string') {
      it.status = it.status ? [it.status] : [];
      migrated = true;
    }
  }));
  if (migrated) saveAll();

  // 倒數計時
  const sc = localStorage.getItem('bs_cd');
  cdTarget = sc ? new Date(sc) : new Date(TRIP_META.cdTarget);
  startCd();

  // VBP 勾選狀態：從 localStorage 讀取，若無則初始化
  const sv = localStorage.getItem('bs_vbp');
  vbpChecked = sv ? JSON.parse(sv) : {};

  // 自動勾選：行程表內有 pass:true 的項目 → 用 item.name 比對 VBP_DATA
  // 同時也比對行程表內所有 item.name 與 VBP_DATA 的 name 是否吻合
  const vbpAllNames = new Set();
  VBP_DATA.forEach(a => a.items.forEach(it => vbpAllNames.add(it.name)));

  tripDays.forEach(d => d.items.forEach(it => {
    // pass:true 的直接勾選（原有邏輯）
    if (it.pass && it.name && !(it.name in vbpChecked)) {
      vbpChecked[it.name] = true;
    }
    // 行程名稱與 VBP 景點完全吻合也勾選
    if (it.name && vbpAllNames.has(it.name) && !(it.name in vbpChecked)) {
      vbpChecked[it.name] = true;
    }
  }));
  saveAll(); // 把自動勾選的狀態存入 localStorage

  // 自動跳到今天
  const todayStr = new Date().toISOString().split('T')[0];
  const match = tripDays.find(d => d.date === todayStr);
  currentDay = match ? match.id : tripDays[0].id;

  renderHeader();
  renderAll();
  setTimeout(scrollToCurrent, 400);
}

// ── 儲存所有資料到 localStorage ──
function saveAll() {
  localStorage.setItem('bs_days', JSON.stringify(tripDays));
  localStorage.setItem('bs_exp',  JSON.stringify(expenses));
  localStorage.setItem('bs_vbp',  JSON.stringify(vbpChecked));
}

// ── 渲染總入口 ──
function renderAll() {
  renderTabs();
  if      (currentView === 'trip')     renderTrip();
  else if (currentView === 'expenses') renderExpenses();
  else if (currentView === 'fx')       renderFx();
  else if (currentView === 'offline')  renderOffline();
}

function renderTabs() {
  document.getElementById('dayTabs').innerHTML = tripDays.map(d => `
    <button class="day-tab ${d.id === currentDay && currentView === 'trip' ? 'active' : ''}"
      onclick="selectDay('${d.id}')">${d.dateLabel}</button>`).join('');
}

function selectDay(id) {
  currentDay = id; currentView = 'trip';
  setNav('nav-trip'); renderAll();
}

// ── 行程頁渲染 ──
function renderTrip() {
  const day = tripDays.find(d => d.id === currentDay);
  if (!day) return;

  // 按時段分組
  const groups = {};
  day.items.forEach(it => { (groups[it.period] = groups[it.period] || []).push(it); });
  const icons = { 上午: '🌅', 下午: '☀️', 晚上: '🌙' };

  let html = `
    <div class="day-hdr">
      <div class="flex items-center justify-between gap-2">
        <div class="flex items-center gap-2 flex-wrap">
          <span style="font-family:'Playfair Display',serif;font-size:.78rem;font-weight:700">${day.dateLabel}</span>
          <span style="font-size:.75rem;opacity:.85">📍 ${day.area}</span>
        </div>
        ${adminMode ? `<button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.35);font-size:.65rem;padding:4px 9px;flex-shrink:0" onclick="addNewItem('${day.id}')">＋ 新增</button>` : ''}
      </div>
    </div>`;

  ['上午', '下午', '晚上'].forEach(p => {
    if (!groups[p]?.length) return;
    html += `<div class="period-hdr">${icons[p]} ${p}</div>`;
    groups[p].forEach((it, i) => { html += renderCard(it, day.id, i); });
  });

  document.getElementById('main').innerHTML = html;
}

// ── 單一行程卡片渲染 ──
function renderCard(it, dayId, idx) {
  // status 統一為陣列（相容舊字串格式）
  const statuses = Array.isArray(it.status) ? it.status : (it.status ? [it.status] : []);

  // ① 時間 + 狀態標籤列（僅在有內容時顯示）
  const timePart   = it.time ? `<span class="time-chip">⏰ ${it.time}</span>` : '';
  const statusPart = statuses.map(s => `<span class="sb ${SBC_MAP[s] || ''}">${s}</span>`).join('');
  const row1 = (timePart || statusPart)
    ? `<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px">${timePart}${statusPart}</div>`
    : '';

  // ② 行程名稱 + 類別 + Pass 標籤
  const catBadge  = it.category ? `<span class="cat-badge c-${it.category}">${it.category}</span>` : '';
  const passBadge = it.pass     ? `<span class="cat-badge" style="background:#FDF2F8;color:#BE185D;border:1px solid #FBCFE8">🎫 釜山PASS</span>` : '';
  const row2 = `<div style="margin-bottom:${it.hours||it.note?'5px':'0'}">
    <div style="display:flex;flex-wrap:wrap;align-items:baseline;gap:5px;margin-bottom:2px">
      <span style="font-weight:800;font-size:.92rem;line-height:1.35;color:var(--text)">${it.name}</span>
      ${catBadge}${passBadge}
    </div>
  </div>`;

  // ③ 營業時間（有才顯示）
  const row3 = it.hours
    ? `<div style="font-size:.72rem;color:var(--text3);margin-bottom:${it.note?'5px':'0'}">🕐 ${it.hours}</div>`
    : '';

  // ④ 備註（有才顯示）
  const row4 = it.note
    ? `<div style="font-size:.72rem;color:var(--text2);background:rgba(0,0,0,.04);border-radius:7px;padding:5px 8px;margin-bottom:0;line-height:1.6">${it.note}</div>`
    : '';

  // ⑤ 地圖導航按鈕（有 nav 才顯示）
  let row5 = '';
  const nav = it.nav || {};
  const navType = nav.type || 'naver';
  const nameEncoded = encodeURIComponent(it.name);
  if (navType !== 'none') {
    if (navType === 'google') {
      const url = nav.url || `https://www.google.com/maps/search/?api=1&query=${nameEncoded}`;
      row5 = `<a href="${url}" target="_blank" class="map-btn map-btn-google">
        <svg width="13" height="13" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#4285F4"/></svg>
        Google Maps</a>`;
    } else {
      const url = nav.url || `https://map.naver.com/v5/search/${nameEncoded}`;
      row5 = `<a href="${url}" target="_blank" class="map-btn map-btn-naver">
        <span style="font-weight:900;font-size:.75rem;line-height:1">N</span> Naver Maps</a>`;
    }
  }

  // ⑥ 預訂跳轉按鈕（Catchtable / NAVER 狀態才顯示）
  // 預設網址可在行程 ⋯ → ✏️ 編輯 → 「預訂頁網址」欄位修改
  let row6 = '';
  if (statuses.includes('Catchtable 預訂')) {
    const ctUrl = it.bookingUrl || 'https://catchtable.co.kr';
    row6 = `<a href="catchtable://"
      onclick="setTimeout(()=>window.open('${ctUrl}','_blank'),800)"
      class="map-btn" style="background:#FF6B001A;color:#FF6B00;border-color:#FF6B0055;font-size:.65rem;padding:5px 10px">
      📋 開啟 Catchtable</a>`;
  }
  if (statuses.includes('NAVER 預訂')) {
    const naverUrl = it.bookingUrl || `https://m.place.naver.com/restaurant/list?query=${encodeURIComponent(it.name)}`;
    row6 += `<a href="navermap://"
      onclick="setTimeout(()=>window.open('${naverUrl}','_blank'),800)"
      class="map-btn map-btn-naver" style="font-size:.65rem;padding:5px 10px">
      🗓️ 開啟 NAVER 預訂</a>`;
  }

  // 判斷是否有底部按鈕（決定卡片底部 padding）
  const bottomRow = [row5, row6].filter(Boolean).join('');
  const hasBottom = !!bottomRow;

  // ── 三個點選單（管理員模式才顯示，保持一般瀏覽畫面乾淨）──
  // 點 ⚙️ 齒輪開啟管理員模式後，每張卡右上角會出現 ⋯ 按鈕
  // 點 ⋯ 可展開：往上移 / 往下移 / 編輯 / 刪除
  // ⋯ 按鈕：onclick 傳入 this 讓選單能定位到按鈕正下方
  const adminBtns = adminMode ? `
    <div style="position:absolute;top:8px;right:8px;z-index:10">
      <button
        onclick="openCardMenu(this,'${it.id}','${dayId}','${it.period}',event)"
        style="width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);
               background:var(--surface);color:var(--text2);font-size:1rem;
               display:flex;align-items:center;justify-content:center;cursor:pointer;
               box-shadow:var(--shadow-sm);letter-spacing:1px;line-height:1"
        title="編輯選項">⋯</button>
    </div>` : '';

  return `
    <div class="trip-card ${getCardClass(statuses)} ${hasBottom ? 'has-bottom' : ''}"
      id="card-${it.id}" style="animation-delay:${idx * .03}s">
      ${adminBtns}
      <div style="padding-right:${adminMode ? '38px' : '8px'}">${row1}${row2}${row3}${row4}</div>
      ${hasBottom ? `<div style="position:absolute;bottom:10px;left:13px;display:flex;gap:6px;flex-wrap:wrap">${bottomRow}</div>` : ''}
    </div>`;
}

function calcSplit() {
  const total  = parseFloat(document.getElementById('splitTotal')?.value);
  const count  = parseInt(document.getElementById('splitCount')?.value) || 1;
  const cur    = document.getElementById('splitCur')?.value || 'twd';
  const res    = document.getElementById('splitResult');
  const perEl  = document.getElementById('splitPerPerson');
  const convEl = document.getElementById('splitConvert');
  const noteEl = document.getElementById('splitNote');
  if (!res) return;
  if (isNaN(total) || total <= 0) { res.style.display = 'none'; return; }

  const per = Math.ceil(total / count);
  const rem = total % count;
  res.style.display = 'block';

  if (cur === 'twd') {
    perEl.textContent  = 'NT$' + per.toLocaleString();
    convEl.textContent = '';
  } else {
    const fxR    = parseFloat(document.getElementById('fxRate')?.value) || FX_RATE.twd_to_krw;
    const perTwd = Math.ceil(per / fxR);
    perEl.textContent  = '₩' + per.toLocaleString();
    convEl.textContent = `≈ NT$${perTwd.toLocaleString()}（匯率 ${fxR}）`;
  }
  noteEl.textContent = `總計 ${cur === 'twd' ? 'NT$' : '₩'}${total.toLocaleString()} ÷ ${count} 人${rem > 0 ? ' (無條件進位)' : ''}`;
}

// 更新快速換算格子的換算結果（不重新渲染整頁，只更新數字）
function updateQuickFx() {
  const grid = document.getElementById('quickFxGrid');
  if (!grid) return;
  const r = parseFloat(document.getElementById('fxRate')?.value) || FX_RATE.twd_to_krw;
  grid.querySelectorAll('.fx-quick-btn').forEach(btn => {
    const v = parseFloat(btn.dataset.val);
    const resultEl = btn.querySelector('.fx-quick-result');
    if (!resultEl) return;
    const result = fxDir === 'twd2krw'
      ? Math.round(v * r).toLocaleString() + ' ₩'
      : (v / r).toFixed(1) + ' NT$';
    resultEl.textContent = result;
  });
}

function setFxDir(dir) { fxDir = dir; renderFx(); }

function calcFx() {
  const v  = parseFloat(document.getElementById('fxInput')?.value);
  const r  = parseFloat(document.getElementById('fxRate')?.value) || FX_RATE.twd_to_krw;
  const el = document.getElementById('fxOutput');
  if (!el) return;
  if (isNaN(v) || v <= 0) { el.textContent = '—'; return; }
  el.textContent = fxDir === 'twd2krw'
    ? '₩' + Math.round(v * r).toLocaleString()
    : 'NT$' + (v / r).toFixed(1);
}

function calcTax() {
  const v      = parseFloat(document.getElementById('taxInput')?.value);
  const r      = parseFloat(document.getElementById('fxRate')?.value) || FX_RATE.twd_to_krw;
  const result = document.getElementById('taxResult');
  const below  = document.getElementById('taxBelow');
  const krwEl  = document.getElementById('taxKrw');
  const twdEl  = document.getElementById('taxTwd');
  const noteEl = document.getElementById('taxNote');
  if (!result) return;
  result.style.display = 'none';
  below.style.display  = 'none';
  if (isNaN(v) || v <= 0) return;
  if (v < 30000) { below.style.display = 'block'; return; }

  let refund = 0, rateNote = '';
  if      (v < 50000)  { refund = Math.round(v * 0.054); rateNote = '級距 3–5萬₩，退稅約 5.4%'; }
  else if (v < 100000) { refund = Math.round(v * 0.057); rateNote = '級距 5–10萬₩，退稅約 5.7%'; }
  else if (v < 200000) { refund = Math.round(v * 0.062); rateNote = '級距 10–20萬₩，退稅約 6.2%'; }
  else if (v < 500000) { refund = Math.round(v * 0.065); rateNote = '級距 20–50萬₩，退稅約 6.5%'; }
  else                 { refund = Math.round(v * 0.068); rateNote = '級距 50萬₩以上，退稅約 6.8%'; }

  const twd = Math.round(refund / r);
  krwEl.textContent  = '₩' + refund.toLocaleString();
  twdEl.textContent  = `折合台幣：約 NT$${twd.toLocaleString()}（匯率 ${r}）`;
  noteEl.innerHTML   = `📋 ${rateNote}<br>🏧 可至機場 Tax Refund 退稅機領取現金或刷退信用卡`;
  result.style.display = 'block';
}

function quickFx(v) {
  // 直接填入數值並計算，不重新渲染頁面（避免匯率被 reset）
  const inp = document.getElementById('fxInput');
  if (inp) { inp.value = v; calcFx(); }
  // 讓被點擊的按鈕短暫高亮
  document.querySelectorAll('.fx-quick-btn').forEach(b => b.classList.remove('active-fx'));
  event && event.currentTarget && event.currentTarget.classList.add('active-fx');
}

// 所有 ⋯ 按鈕共用同一個 #floatMenu，依按鈕位置定位
let _floatMenuOpen = false;

function _ensureFloatMenu() {
  if (!document.getElementById('floatMenu')) {
    const el = document.createElement('div');
    el.id = 'floatMenu';
    el.style.cssText = `
      display:none;position:fixed;z-index:9999;
      background:var(--surface);border:1.5px solid var(--border);
      border-radius:12px;box-shadow:0 8px 32px rgba(26,31,54,.18);
      min-width:110px;overflow:hidden;
    `;
    document.body.appendChild(el);
    // 點選單外部自動關閉
    document.addEventListener('click', function(e) {
      const m = document.getElementById('floatMenu');
      if (m && !m.contains(e.target)) _hideFloatMenu();
    });
  }
  return document.getElementById('floatMenu');
}

function _showFloatMenu(btn, html) {
  const m = _ensureFloatMenu();
  m.innerHTML = html;
  // 先設為不可見但可渲染，才能取得正確高度
  m.style.visibility = 'hidden';
  m.style.display = 'block';
  // requestAnimationFrame 確保瀏覽器完成 paint 後再計算位置
  requestAnimationFrame(() => {
    const r = btn.getBoundingClientRect();
    const menuH = m.offsetHeight;
    const menuW = m.offsetWidth;
    const spaceBelow = window.innerHeight - r.bottom - 8;
    const top  = spaceBelow >= menuH ? r.bottom + 4 : r.top - menuH - 4;
    // 水平：優先靠右對齊按鈕，若超出左邊界則靠左
    const left = Math.max(8, Math.min(r.right - menuW, window.innerWidth - menuW - 8));
    m.style.top  = top + 'px';
    m.style.left = left + 'px';
    m.style.visibility = 'visible';
    _floatMenuOpen = true;
  });
}

function _hideFloatMenu() {
  const m = document.getElementById('floatMenu');
  if (m) m.style.display = 'none';
  _floatMenuOpen = false;
}

// ── 行程上下移動（同時段內） ──
function moveItem(itemId, dayId, period, delta) {
  const day   = tripDays.find(d => d.id === dayId);
  const items = day.items;

  // 取出同時段的項目（保留原始 index）
  const group = items
    .map((it, i) => ({ it, i }))
    .filter(({ it }) => it.period === period);

  const posInGroup = group.findIndex(({ it }) => it.id === itemId);
  const newPosInGroup = posInGroup + delta;

  // 超出範圍就不動
  if (newPosInGroup < 0 || newPosInGroup >= group.length) return;

  // 在全陣列中交換這兩個元素
  const idxA = group[posInGroup].i;
  const idxB = group[newPosInGroup].i;
  [items[idxA], items[idxB]] = [items[idxB], items[idxA]];

  saveAll(); renderTrip();
}

// ── 倒數計時 ──
function startCd() {
  if (cdInterval) clearInterval(cdInterval);
  cdInterval = setInterval(updateCd, 1000);
  updateCd();
}

function updateCd() {
  const diff = cdTarget - new Date();
  const el   = document.getElementById('cdDigits');
  const fill = document.getElementById('cdFill');
  if (!el) return;
  if (diff <= 0) {
    el.textContent = '🎉 出發！'; el.style.color = 'var(--teal)';
    if (fill) fill.style.width = '0%';
    return;
  }
  const days = Math.floor(diff / 86400000);
  const h    = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
  const m    = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
  const s    = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
  el.textContent = days > 0 ? `${days}天 ${h}:${m}:${s}` : `${h}:${m}:${s}`;
  if (fill) {
    const base = new Date('2026-01-01');
    const pct  = Math.max(0, Math.min(100, (diff / (cdTarget - base)) * 100));
    fill.style.width     = pct + '%';
    fill.className = 'cd-fill' + (pct < 20 ? ' red' : pct < 50 ? ' yellow' : '');
  }
}

// ── 動態時間高亮（標記「現在」的行程）──
function highlightCurrentItem() {
  document.querySelectorAll('.trip-card.now').forEach(c => c.classList.remove('now'));
  const todayStr = new Date().toISOString().split('T')[0];
  const day      = tripDays.find(d => d.date === todayStr);
  if (!day || currentDay !== day.id) return;

  const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
  const timed  = day.items
    .filter(it => it.time)
    .sort((a, b) => {
      const [ah, am] = a.time.split(':').map(Number);
      const [bh, bm] = b.time.split(':').map(Number);
      return (ah * 60 + am) - (bh * 60 + bm);
    });
  if (!timed.length) return;

  let current = null;
  for (let i = 0; i < timed.length; i++) {
    const [hh, mm]  = timed[i].time.split(':').map(Number);
    const itemMin   = hh * 60 + mm;
    const nextMin   = i + 1 < timed.length
      ? (() => { const [nh, nm] = timed[i + 1].time.split(':').map(Number); return nh * 60 + nm; })()
      : Infinity;
    if (nowMin >= itemMin && nowMin < nextMin) { current = timed[i]; break; }
  }
  if (!current && timed.length) {
    const [fh, fm] = timed[0].time.split(':').map(Number);
    if (nowMin < fh * 60 + fm) current = timed[0];
  }
  if (current) {
    const card = document.getElementById('card-' + current.id);
    if (card) { card.classList.add('now'); card.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  }
}

function scrollToCurrent() { highlightCurrentItem(); }

// ── 導覽切換 ──
function switchView(v) {
  currentView = v;
  const navMap = { trip: 'nav-trip', expenses: 'nav-exp', fx: 'nav-fx', offline: 'nav-offline' };
  setNav(navMap[v] || 'nav-trip');
  renderAll();
}

function setNav(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

// ── Modal ──
function showModal(html) {
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-box" id="modalBox">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <div style="width:34px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 0 auto;flex:1;max-width:34px;"></div>
          <button onclick="closeModal()" aria-label="關閉"
            style="width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);
                   background:var(--bg);color:var(--text2);font-size:.85rem;cursor:pointer;
                   display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px">✕</button>
        </div>
        ${html}
      </div>
    </div>`;
  const overlay = document.getElementById('modalOverlay');
  let downOnOverlay = false;
  overlay.addEventListener('mousedown',  e => { downOnOverlay = e.target === overlay; });
  overlay.addEventListener('mouseup',    e => { if (downOnOverlay && e.target === overlay) closeModal(); });
  overlay.addEventListener('touchstart', e => { downOnOverlay = e.target === overlay; }, { passive: true });
  overlay.addEventListener('touchend',   e => { if (downOnOverlay && e.target === overlay) closeModal(); });
}

function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── 啟動 ──
// 若在 LINE 內開啟，自動跳到外部瀏覽器（加 ?openExternalBrowser=1 參數）
(function(){
  var ua = navigator.userAgent || '';
  if (/Line/i.test(ua) && !/openExternalBrowser/.test(location.search)) {
    var sep = location.search ? '&' : '?';
    location.replace(location.href + sep + 'openExternalBrowser=1');
  }
})();
init();

// 長按「💱」開啟離線資訊
document.addEventListener('DOMContentLoaded', () => {
  const fxBtn = document.getElementById('nav-fx');
  if (!fxBtn) return;
  let pressTimer;
  const startPress = () => { pressTimer = setTimeout(() => switchView('offline'), 600); };
  const endPress   = () => clearTimeout(pressTimer);
  fxBtn.addEventListener('touchstart', startPress);
  fxBtn.addEventListener('touchend',   endPress);
  fxBtn.addEventListener('mousedown',  startPress);
  fxBtn.addEventListener('mouseup',    endPress);
});
</script>
