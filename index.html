<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🇰🇷 釜山旅遊管理 v12</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════
   顏色系統 — 修改這裡就能換整個 App 的配色
   ════════════════════════════════════════════════════ */
:root {
  --bg:       #F5F6FA;   /* 頁面背景色 */
  --surface:  #FFFFFF;   /* 卡片白色 */
  --border:   #E2E6F0;   /* 邊框顏色 */
  --text:     #1A1F36;   /* 主要文字 */
  --text2:    #4A5568;   /* 次要文字 */
  --text3:    #8A93A8;   /* 淡色提示文字 */

  /* 主題色 */
  --teal:     #0ABFA3;
  --teal-lt:  #E8FBF8;
  --teal-bd:  #9FEDE4;

  /* 狀態色 */
  --red:      #FF6B6B;  --red-lt:  #FFF0F0;  --red-bd:  #FFCECE;
  --gold:     #F59E0B;  --gold-lt: #FFFBEB;  --gold-bd: #FDE68A;
  --rose:     #F472B6;  --rose-lt: #FDF2F8;  --rose-bd: #FBCFE8;
  --violet:   #8B5CF6;  --violet-lt:#F5F3FF; --violet-bd:#DDD6FE;
  --green:    #10B981;  --green-lt: #ECFDF5; --green-bd: #A7F3D0;
  --orange:   #F97316;  --orange-lt:#FFF7ED; --orange-bd:#FED7AA;
  --blue:     #3B82F6;  --blue-lt:  #EFF6FF; --blue-bd:  #BFDBFE;

  --shadow-sm: 0 1px 3px rgba(26,31,54,.06),0 1px 2px rgba(26,31,54,.04);
  --shadow:    0 4px 12px rgba(26,31,54,.08),0 2px 4px rgba(26,31,54,.04);
  --shadow-lg: 0 20px 48px rgba(26,31,54,.14),0 8px 16px rgba(26,31,54,.08);
}

/* ════════════════════════════════════════════════════
   全域基礎樣式
   ════════════════════════════════════════════════════ */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none}

/* Header */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);position:sticky;top:0;z-index:50}

/* Countdown bar */
.cd-bar{height:5px;border-radius:3px;background:var(--border);overflow:hidden;margin-top:6px}
.cd-fill{height:100%;border-radius:3px;background:var(--green);transition:background .5s,width 1s linear}
.cd-fill.yellow{background:var(--gold)}
.cd-fill.red{background:var(--red);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.cd-digits{font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;letter-spacing:1px;color:var(--text)}

/* Day tabs */
.day-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{padding:6px 13px;border-radius:20px;font-size:.73rem;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);color:var(--text2);background:var(--surface);transition:all .18s}
.day-tab:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-lt)}
.day-tab.active{background:var(--teal);color:#fff;border-color:var(--teal);box-shadow:0 4px 12px rgba(10,191,163,.3);font-weight:800}

/* Day header card */
.day-hdr{background:linear-gradient(135deg,#0ABFA3,#0891B2);border-radius:16px;padding:16px 20px;margin-bottom:14px;color:#fff;box-shadow:0 8px 24px rgba(10,191,163,.25)}

/* Period divider */
.period-hdr{font-size:.66rem;font-weight:800;letter-spacing:2px;color:var(--text3);padding:13px 2px 5px;display:flex;align-items:center;gap:8px}
.period-hdr::after{content:'';flex:1;height:1px;background:var(--border)}

/* Trip card */
.trip-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:13px 13px 36px;margin-bottom:8px;box-shadow:var(--shadow-sm);transition:all .2s;position:relative;animation:cardIn .22s ease both}
.trip-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:14px 0 0 14px;background:var(--border)}
.trip-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);border-color:#C8D0E4}
/* 當前行程高亮（▶現在 標籤位移避開編輯鍵） */
.trip-card.now{border-color:var(--gold)!important;background:var(--gold-lt)!important;box-shadow:0 0 0 3px rgba(245,158,11,.15),var(--shadow)!important}
.trip-card.now::after{content:'▶ 現在';position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--gold);color:#fff;font-size:.58rem;font-weight:800;padding:2px 10px;border-radius:0 0 8px 8px}

/* 各狀態左邊框 + 背景 */
.c-urgent{border-color:var(--red-bd)!important;background:var(--red-lt)!important}.c-urgent::before{background:var(--red)}
.c-booked{border-color:var(--teal-bd)!important;background:var(--teal-lt)!important}.c-booked::before{background:var(--teal)}
.c-reserved{border-color:var(--gold-bd)!important;background:var(--gold-lt)!important}.c-reserved::before{background:var(--gold)}
.c-walkin{border-color:var(--rose-bd)!important;background:var(--rose-lt)!important}.c-walkin::before{background:var(--rose)}
.c-catchtable{border-color:var(--orange-bd)!important;background:var(--orange-lt)!important}.c-catchtable::before{background:var(--orange)}
.c-naver{border-color:var(--green-bd)!important;background:var(--green-lt)!important}.c-naver::before{background:var(--green)}

/* Badges */
.cat-badge{font-size:.63rem;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:.3px}
.c-集合出發{background:#FEE2E2;color:#DC2626}
.c-景點{background:#DBEAFE;color:#1D4ED8}
.c-餐廳{background:#FEF3C7;color:#B45309}
.c-點心{background:#FCE7F3;color:#BE185D}
.c-交通{background:#EDE9FE;color:#6D28D9}
.c-住宿{background:#D1FAE5;color:#065F46}

.sb{font-size:.59rem;padding:2.5px 7px;border-radius:10px;font-weight:800}
.sb-urgent{background:var(--red);color:#fff}
.sb-booked{background:var(--teal);color:#fff}
.sb-reserved{background:var(--gold);color:#fff}
.sb-walkin{background:var(--rose);color:#fff}
.sb-catchtable{background:var(--orange);color:#fff}
.sb-naver{background:var(--green);color:#fff}

.time-chip{font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;color:var(--gold);background:var(--gold-lt);padding:2px 7px;border-radius:7px;border:1px solid var(--gold-bd)}

/* 地圖導航按鈕 */
.map-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:.68rem;font-weight:700;border:1.5px solid;text-decoration:none;transition:all .15s;cursor:pointer;white-space:nowrap}
.map-btn-naver{background:#03C75A1A;color:#03C75A;border-color:#03C75A55}
.map-btn-naver:hover{background:#03C75A;color:#fff}
.map-btn-google{background:#4285F41A;color:#4285F4;border-color:#4285F455}
.map-btn-google:hover{background:#4285F4;color:#fff}

/* Gear button */
.gear-btn{width:34px;height:34px;background:#F5F6FA;border:1.5px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;font-size:.95rem;color:var(--text2)}
.gear-btn:hover{transform:rotate(45deg)}
.gear-btn.on{background:var(--violet-lt);border-color:var(--violet-bd);color:var(--violet)}

/* Admin bar */
.admin-bar{background:var(--violet-lt);border:1.5px solid var(--violet-bd);border-radius:12px;padding:10px 14px;margin:0 12px 10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* Buttons */
.btn{padding:8px 15px;border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .18s;border:none;font-family:'Noto Sans TC',sans-serif;display:inline-flex;align-items:center;gap:5px}
.btn-teal{background:var(--teal);color:#fff;box-shadow:0 4px 12px rgba(10,191,163,.25)}
.btn-teal:hover{background:#09A58E}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#E85555}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:#D97706}
.btn-ghost{background:#F5F6FA;color:var(--text2);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--border);color:var(--text)}
.btn-violet{background:var(--violet);color:#fff}
.btn-sm{padding:5px 11px;font-size:.71rem;border-radius:8px}
.btn-xs{padding:4px 9px;font-size:.63rem;border-radius:7px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,31,54,.4);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
@media(min-width:640px){.modal-overlay{align-items:center}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--surface);border-radius:22px 22px 0 0;padding:22px 18px 32px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .25s cubic-bezier(.34,1.56,.64,1)}
@media(min-width:640px){.modal-box{border-radius:18px;padding:26px 22px}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:34px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 18px}

/* Forms */
.form-label{font-size:.7rem;font-weight:800;color:var(--text2);margin-bottom:4px;display:block;letter-spacing:.3px}
.form-input{background:#F5F6FA;border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:9px 12px;font-size:.83rem;font-family:'Noto Sans TC',sans-serif;width:100%;transition:all .18s}
.form-input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(10,191,163,.12);background:#fff}
.form-select{background:#F5F6FA;border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:9px 12px;font-size:.83rem;font-family:'Noto Sans TC',sans-serif;width:100%}
.form-select:focus{outline:none;border-color:var(--teal)}

/* Expense card */
.exp-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:15px;margin-bottom:9px;box-shadow:var(--shadow-sm)}

/* VBP Drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(26,31,54,.3);backdrop-filter:blur(4px);z-index:150;animation:fadeIn .2s ease}
.drawer{position:fixed;right:0;top:0;bottom:0;width:min(100vw,390px);background:var(--surface);box-shadow:var(--shadow-lg);z-index:151;display:flex;flex-direction:column;animation:slideRight .25s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
.drawer-hdr{padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-body{flex:1;overflow-y:auto;padding:10px 14px 100px}
.vbp-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 13px;margin-bottom:7px;box-shadow:var(--shadow-sm);transition:all .18s;animation:cardIn .22s ease both}
.vbp-card:hover{box-shadow:var(--shadow);border-color:#C8D0E4}
.vbp-area-hdr{font-size:.72rem;font-weight:800;letter-spacing:2px;color:var(--text3);padding:13px 2px 7px;display:flex;align-items:center;gap:8px}
.vbp-area-hdr::after{content:'';flex:1;height:1.5px;background:var(--border)}
.tier{font-size:.57rem;padding:2px 6px;border-radius:7px;font-weight:800}
.tier-free{background:#D1FAE5;color:#065F46}
.tier-blue{background:#DBEAFE;color:#1D4ED8}
.tier-purple{background:#EDE9FE;color:#5B21B6}

/* Filter tabs */
.ftab{padding:5px 11px;border-radius:16px;font-size:.7rem;font-weight:700;cursor:pointer;transition:all .15s;border:1.5px solid var(--border);color:var(--text2);background:var(--surface);white-space:nowrap}
.ftab:hover{border-color:var(--teal);color:var(--teal)}
.ftab.active{background:var(--teal);color:#fff;border-color:var(--teal)}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);border-top:1px solid var(--border);backdrop-filter:blur(15px);z-index:100;display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px));box-shadow:0 -4px 20px rgba(26,31,54,.07)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 3px;cursor:pointer;transition:all .18s;color:var(--text3);font-size:.56rem;font-weight:800;letter-spacing:.5px;background:none;border:none}
.nav-btn:hover,.nav-btn.active{color:var(--teal)}
.nav-icon-wrap{padding:4px 12px;border-radius:10px;transition:all .18s}
.nav-btn.active .nav-icon-wrap{background:var(--teal-lt)}
.nav-icon{font-size:1.12rem;display:block}

/* Toast */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--text);color:#fff;padding:10px 18px;border-radius:12px;font-size:.8rem;font-weight:700;z-index:9999;opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Currency converter */
.fx-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:18px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.fx-display{font-family:'DM Mono',monospace;font-size:2rem;font-weight:500;color:var(--teal);letter-spacing:1px}
.fx-quick-btn{padding:7px 14px;border-radius:10px;font-size:.75rem;font-weight:700;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
.fx-quick-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-lt)}
.fx-quick-btn.active-fx{background:var(--teal);color:#fff;border-color:var(--teal)}

/* Offline info cards */
.info-section{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.phrase-ko{font-size:.8rem;font-weight:700;color:var(--text);line-height:1.3}
.phrase-zh{font-size:.7rem;color:var(--text2)}
.phrase-ro{font-size:.67rem;color:var(--text3);font-style:italic}

@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ════════════════════════════════════════════════
     HEADER
     ════════════════════════════════════════════════ -->
<header class="app-header">
  <div class="px-4 pt-4 pb-3">
    <!-- 標題列 -->
    <div class="flex items-start justify-between gap-2 mb-2">
      <div>
        <h1 style="font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text)" id="hdrTitle"></h1>
        <div class="flex gap-2 mt-1 flex-wrap" id="hdrBadges"></div>
      </div>
      <!-- 右上角：齒輪 + 倒數 -->
      <div class="flex flex-col items-end gap-1.5">
        <button class="gear-btn" id="gearBtn" onclick="toggleAdmin()" title="管理員模式">⚙️</button>
        <div style="text-align:right">
          <div class="cd-digits" id="cdDigits">--:--:--</div>
          <button onclick="showCdSettings()" style="font-size:.65rem;color:var(--text3);background:none;border:none;cursor:pointer;display:block;margin-top:1px">VBP 倒數 ▾</button>
        </div>
      </div>
    </div>
    <!-- 倒數進度條 -->
    <div class="cd-bar"><div class="cd-fill" id="cdFill" style="width:100%"></div></div>
    <!-- 日期 Tabs -->
    <div class="day-tabs mt-3" id="dayTabs"></div>
  </div>
</header>

<!-- 管理員工具列（預設隱藏） -->
<div id="adminBar" style="display:none">
  <div class="admin-bar">
    <span style="font-size:.7rem;font-weight:800;color:var(--violet)">⚙️ 管理員模式</span>
    <button class="btn btn-ghost btn-sm" onclick="showExport()">⬇️ 下載 HTML</button>
    <button class="btn btn-sm" style="background:var(--violet-lt);color:var(--violet);border:1.5px solid var(--violet-bd)" onclick="resetData()">♻️ 重設</button>
  </div>
</div>

<!-- ════════════════════════════════════════════════
     主要內容區
     ════════════════════════════════════════════════ -->
<main id="main" class="px-3 pt-2 pb-28"></main>

<!-- ════════════════════════════════════════════════
     底部導覽列
     ════════════════════════════════════════════════ -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-trip" onclick="switchView('trip')">
    <div class="nav-icon-wrap"><span class="nav-icon">🗓️</span></div>行程
  </button>
  <button class="nav-btn" id="nav-vbp" onclick="openVbpDrawer('')">
    <div class="nav-icon-wrap"><span class="nav-icon">🗺️</span></div>景點圖鑑
  </button>
  <button class="nav-btn" id="nav-add" onclick="addNewItem()">
    <div class="nav-icon-wrap" style="background:var(--teal);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;margin-top:-10px;box-shadow:0 4px 14px rgba(10,191,163,.4)">
      <span class="nav-icon" style="color:#fff;font-size:1.4rem">＋</span>
    </div>新增
  </button>
  <button class="nav-btn" id="nav-exp" onclick="switchView('expenses')">
    <div class="nav-icon-wrap"><span class="nav-icon">💰</span></div>費用
  </button>
  <button class="nav-btn" id="nav-fx" onclick="switchView('fx')">
    <div class="nav-icon-wrap"><span class="nav-icon">💱</span></div>匯率
  </button>
</nav>

<div id="modalContainer"></div>
<div id="drawerContainer"></div>

<!-- ╔══════════════════════════════════════════════════════════════╗
     ║   ✏️  旅遊 App 修改手冊  ── 只需改這個區塊！                ║
     ╚══════════════════════════════════════════════════════════════╝

  📌 使用流程（三步驟）
  ──────────────────────────────────────────────────────────────
  ① 用瀏覽器打開 HTML → 點右上角 ⚙️ 進入「管理員模式」
  ② 直接在 App 內點「✏️」編輯行程卡片（最方便）
     或是在下方程式碼直接修改資料
  ③ ⚙️ → 「⬇️ 下載 HTML」→ 覆蓋上傳到 GitHub
     → 成員用原本的網址就能看到最新版，無需任何操作 ✅

  ──────────────────────────────────────────────────────────────
  📂 六個資料區塊（依序排列，每個都有詳細說明）
  ──────────────────────────────────────────────────────────────
  【1】TRIP_META    → 旅遊名稱、日期、人數、倒數計時
  【2】TRIP_DAYS    → 每日行程（最常修改這裡）
  【3】DEFAULT_EXPENSES → 費用明細（機票、住宿、雜費）
  【4】VBP_DATA     → 釜山通行證景點圖鑑
  【5】OFFLINE_INFO → 緊急電話、交通、韓語會話
  【6】FX_RATE      → 離線匯率（出發前更新一次）

  ──────────────────────────────────────────────────────────────
  🎨 換配色：修改 CSS 最上方 :root 裡的變數
  ──────────────────────────────────────────────────────────────
  --bg      頁面背景    --surface  卡片底色    --border  邊框
  --text    主要文字    --text2    次要文字    --text3   提示文字
  --teal    主題色（同時修改 --teal-lt 淡底色、--teal-bd 邊框色）

  ──────────────────────────────────────────────────────────────
  ⚠️  JSON 語法提醒
  ──────────────────────────────────────────────────────────────
  • 字串值用雙引號：  "值"
  • 數字不用引號：    123
  • 布林值不用引號：  true / false
  • 項目之間用逗號，最後一項「不加」逗號
  ════════════════════════════════════════════════════════════════ -->

<script>

/* ════════════════════════════════════════════════════════════
   【1】TRIP_META — 旅遊基本資訊
   ════════════════════════════════════════════════════════════
   ┌─────────────┬──────────────────────────────────────────┐
   │ 欄位        │ 說明                                     │
   ├─────────────┼──────────────────────────────────────────┤
   │ title       │ App 頂部顯示的旅遊名稱                   │
   │ emoji       │ 標題前的表情符號（🇰🇷 ✈️ 🌏 等）        │

/* ══════════════════════════════════════════════════════════
   ⛔ 以下是程式邏輯區 — 一般情況請勿修改
   ══════════════════════════════════════════════════════════ */

// ── 狀態 ──
let tripDays   = null;
let expenses   = null;
let currentView = 'trip';
let currentDay  = null;
let adminMode   = false;
let cdInterval  = null;
let cdTarget    = null;
let vbpChecked  = {};   // key: item.name, value: true/false

const STATUSES = ['','重要！勿遲到','已預約','需提前預約','現場劃位','Catchtable 預訂','NAVER 預訂'];
const CATS     = ['','景點','餐廳','點心','交通','住宿','集合出發'];
const PERIODS  = ['上午','下午','晚上'];

// ── Header ──
function renderHeader() {
  document.getElementById('hdrTitle').textContent = `${TRIP_META.emoji} ${TRIP_META.title}`;
  document.getElementById('hdrBadges').innerHTML = `
    <span style="background:var(--teal-lt);border:1px solid var(--teal-bd);border-radius:20px;padding:2px 10px;font-size:.67rem;color:var(--teal);font-weight:700">${TRIP_META.dateRange} · ${TRIP_META.duration}</span>`;
}

// ── 初始化 ──
function init() {
  // 行程
  const sd = localStorage.getItem('bs_days');
  tripDays = sd ? JSON.parse(sd) : JSON.parse(JSON.stringify(TRIP_DAYS));

  // 費用
  const se = localStorage.getItem('bs_exp');
  expenses = se ? JSON.parse(se) : JSON.parse(JSON.stringify(DEFAULT_EXPENSES));

  // ── 資料遷移（修正舊快取中的欄位值）──
  let migrated = false;
  tripDays.forEach(d => d.items.forEach(it => {
    if (it.period === '早上') { it.period = '上午'; migrated = true; }
    if (it.status === '重要!勿遲到') { it.status = '重要！勿遲到'; migrated = true; }
  }));
  if (migrated) saveAll();

  // 倒數時間
  const sc = localStorage.getItem('bs_cd');
  cdTarget = sc ? new Date(sc) : new Date(TRIP_META.cdTarget);
  startCd();

  // VBP 勾選狀態 — 先從 localStorage 讀，再同步 pass:true 的行程景點
  const sv = localStorage.getItem('bs_vbp');
  vbpChecked = sv ? JSON.parse(sv) : {};
  tripDays.forEach(d => d.items.forEach(it => {
    if (it.pass && it.name && !(it.name in vbpChecked)) vbpChecked[it.name] = true;
  }));

  // 今日定位
  const todayStr = new Date().toISOString().split('T')[0];
  const match = tripDays.find(d => d.date === todayStr);
  currentDay = match ? match.id : tripDays[0].id;

  renderHeader();
  renderAll();
  setTimeout(scrollToCurrent, 400);
}

function saveAll() {
  localStorage.setItem('bs_days', JSON.stringify(tripDays));
  localStorage.setItem('bs_exp',  JSON.stringify(expenses));
  localStorage.setItem('bs_vbp',  JSON.stringify(vbpChecked));
}

// ── 渲染 ──
function renderAll() {
  renderTabs();
  if (currentView === 'trip')     renderTrip();
  else if (currentView === 'expenses') renderExpenses();
  else if (currentView === 'fx')  renderFx();
  else if (currentView === 'offline') renderOffline();
}

function renderTabs() {
  document.getElementById('dayTabs').innerHTML = tripDays.map(d => `
    <button class="day-tab ${d.id===currentDay&&currentView==='trip'?'active':''}"
      onclick="selectDay('${d.id}')">${d.dateLabel}</button>`).join('');
}

function selectDay(id) {
  currentDay = id; currentView = 'trip';
  setNav('nav-trip'); renderAll();
}

// ── 行程渲染 ──
function renderTrip() {
  const day = tripDays.find(d => d.id === currentDay);
  if (!day) return;
  const groups = {};
  day.items.forEach(it => { (groups[it.period] = groups[it.period]||[]).push(it); });
  const icons = {上午:'🌅',下午:'☀️',晚上:'🌙'};
  let html = `
    <div class="day-hdr">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <div>
          <div style="font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700">${day.dateLabel}</div>

// ── 狀態對照表（共用） ──
const CC_MAP  = {'重要！勿遲到':'c-urgent','已預約':'c-booked','需提前預約':'c-reserved','現場劃位':'c-walkin','Catchtable 預訂':'c-catchtable','NAVER 預訂':'c-naver'};
const SBC_MAP = {'重要！勿遲到':'sb-urgent','已預約':'sb-booked','需提前預約':'sb-reserved','現場劃位':'sb-walkin','Catchtable 預訂':'sb-catchtable','NAVER 預訂':'sb-naver'};

function renderCard(it, dayId, idx) {
  // ① 時間 + 狀態（同一行，靠左）
  const timePart   = it.time   ? `<span class="time-chip">⏰ ${it.time}</span>` : '';
  const statusPart = it.status ? `<span class="sb ${SBC_MAP[it.status]||''}">${it.status}</span>` : '';
  const row1 = (timePart || statusPart)
    ? `<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px">${timePart}${statusPart}</div>`
    : '';

  // ② 景點名稱，後方同行：類別 / 釜山PASS
  const catBadge  = it.category ? `<span class="cat-badge c-${it.category}">${it.category}</span>` : '';
  const passBadge = it.pass     ? `<span class="cat-badge" style="background:#FDF2F8;color:#BE185D;border:1px solid #FBCFE8">🎫 釜山PASS</span>` : '';
  const row2 = `<div style="margin-bottom:5px">
    <div style="display:flex;flex-wrap:wrap;align-items:baseline;gap:5px;margin-bottom:2px">
      <span style="font-weight:800;font-size:.92rem;line-height:1.35;color:var(--text)">${it.name}</span>
      ${catBadge}${passBadge}
    </div>
  </div>`;

  // ③ 營業時間
  const row3 = it.hours
    ? `<div style="font-size:.72rem;color:var(--text3);margin-bottom:5px">🕐 ${it.hours}</div>`
    : '';

  // ④ 備註
  const row4 = it.note
    ? `<div style="font-size:.72rem;color:var(--text2);background:rgba(0,0,0,.04);border-radius:7px;padding:5px 8px;margin-bottom:7px;line-height:1.6">${it.note}</div>`
    : '';

  // ⑤ 導航按鈕（統一使用 HTTPS，手機系統自動判斷跳 App）
  let row5 = '';
  const nav = it.nav || {};
  const navType = nav.type || 'naver';
  // 若有自訂 url 優先用，否則用 name 自動產生
  const nameEncoded = encodeURIComponent(it.name);
  if (navType !== 'none') {
    if (navType === 'google') {
      const url = nav.url || `https://www.google.com/maps/search/?api=1&query=${nameEncoded}`;
      row5 = `<a href="${url}" target="_blank" class="map-btn map-btn-google"><svg width="13" height="13" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#4285F4"/></svg> Google Maps</a>`;
    } else {
      const url = nav.url || `https://map.naver.com/v5/search/${nameEncoded}`;
      row5 = `<a href="${url}" target="_blank" class="map-btn map-btn-naver"><span style="font-weight:900;font-size:.75rem;line-height:1">N</span> Naver Maps</a>`;
    }
  }

  // ⑥ 預訂跳轉按鈕（Catchtable / NAVER）
  let row6 = '';
  if (it.status === 'Catchtable 預訂') {
    row6 = `<a href="catchtable://" onclick="setTimeout(()=>window.open('https://catchtable.co.kr','_blank'),800)"
      class="map-btn" style="background:#FF6B001A;color:#FF6B00;border-color:#FF6B0055;font-size:.65rem;padding:5px 10px">
      📋 開啟 Catchtable
    </a>`;
  } else if (it.status === 'NAVER 預訂') {
    row6 = `<a href="navermap://" onclick="setTimeout(()=>window.open('https://m.place.naver.com/restaurant/list?query='+encodeURIComponent(${JSON.stringify(it.name)}),'_blank'),800)"
      class="map-btn map-btn-naver" style="font-size:.65rem;padding:5px 10px">
      🗓️ 開啟 NAVER 預訂
    </a>`;
  }

  const bottomRow = [row5, row6].filter(Boolean).join('');

  return `
    <div class="trip-card ${CC_MAP[it.status]||''}" id="card-${it.id}" style="animation-delay:${idx*.03}s">
      <div style="position:absolute;top:10px;right:10px;display:flex;gap:5px;z-index:1">
        <button class="btn btn-ghost btn-xs" onclick="editItem('${it.id}','${dayId}')">✏️</button>

          onclick="deleteItem('${it.id}','${dayId}')">🗑️</button>
      </div>
      <div style="padding-right:64px">${row1}${row2}${row3}${row4}</div>
      ${bottomRow ? `<div style="position:absolute;bottom:10px;left:13px;display:flex;gap:6px;flex-wrap:wrap">${bottomRow}</div>` : ''}
    </div>`;
}

  const t = document.getElementById('et').value;

  e.item = document.getElementById('en').value.trim();
  e.perPerson = parseInt(document.getElementById('ep').value)||0;

function deleteExpense(id) {
  if (!confirm('確定刪除這個費用項目？')) return;
  expenses = expenses.filter(x => x.id !== id);
  saveAll(); renderExpenses();

function calcSplit() {
  const total   = parseFloat(document.getElementById('splitTotal')?.value);
  const count   = parseInt(document.getElementById('splitCount')?.value) || 1;
  const cur     = document.getElementById('splitCur')?.value || 'twd';
  const res     = document.getElementById('splitResult');
  const perEl   = document.getElementById('splitPerPerson');
  const convEl  = document.getElementById('splitConvert');
  const noteEl  = document.getElementById('splitNote');
  if (!res) return;
  if (isNaN(total) || total <= 0) { res.style.display='none'; return; }

  const per = Math.ceil(total / count);
  const rem = total % count;
  res.style.display = 'block';

  if (cur === 'twd') {
    perEl.textContent  = 'NT$' + per.toLocaleString();
    convEl.textContent = '';
  } else {
    const fxR = parseFloat(document.getElementById('fxRate')?.value) || FX_RATE.twd_to_krw;
    const perTwd = Math.ceil(per / fxR);
    perEl.textContent  = '₩' + per.toLocaleString();
    convEl.textContent = `≈ NT$${perTwd.toLocaleString()}（匯率 ${fxR}）`;
  }
  noteEl.textContent = `總計 ${cur==='twd'?'NT$':'₩'}${total.toLocaleString()} ÷ ${count} 人${rem>0?' (無條件進位)':''}`;
}

function calcFx() {

  const el = document.getElementById('fxOutput');
  if (!el) return;
  if (isNaN(v) || v <= 0) { el.textContent = '—'; return; }
  if (fxDir === 'twd2krw') {
    el.textContent = '₩' + Math.round(v * r).toLocaleString();
  } else {
    el.textContent = 'NT$' + (v / r).toFixed(1);
  }
}

function calcTax() {
  const v = parseFloat(document.getElementById('taxInput')?.value);
  const r = parseFloat(document.getElementById('fxRate')?.value) || FX_RATE.twd_to_krw;
  const result  = document.getElementById('taxResult');
  const below   = document.getElementById('taxBelow');
  const krwEl   = document.getElementById('taxKrw');
  const twdEl   = document.getElementById('taxTwd');
  const noteEl  = document.getElementById('taxNote');

  result.style.display = 'none';
  below.style.display  = 'none';

  if (isNaN(v) || v <= 0) return;

  if (v < 30000) {
    below.style.display = 'block';
    return;
  }

  let refund = 0;
  let rateNote = '';
  if (v < 50000)       { refund = Math.round(v * 0.054); rateNote = '級距 3–5萬₩，退稅約 5.4%'; }
  else if (v < 100000) { refund = Math.round(v * 0.057); rateNote = '級距 5–10萬₩，退稅約 5.7%'; }
  else if (v < 200000) { refund = Math.round(v * 0.062); rateNote = '級距 10–20萬₩，退稅約 6.2%'; }
  else if (v < 500000) { refund = Math.round(v * 0.065); rateNote = '級距 20–50萬₩，退稅約 6.5%'; }
  else                 { refund = Math.round(v * 0.068); rateNote = '級距 50萬₩以上，退稅約 6.8%'; }

  const twd = Math.round(refund / r);

  krwEl.textContent  = '₩' + refund.toLocaleString();
  twdEl.textContent  = `折合台幣：約 NT$${twd.toLocaleString()}（匯率 ${r}）`;
  noteEl.innerHTML   = `📋 ${rateNote}<br>🏧 可至機場 Tax Refund 退稅機領取現金或刷退信用卡`;
  result.style.display = 'block';
}

}

function dlHtml() {
  // 把目前 tripDays / expenses 寫回 HTML 的 TRIP_DAYS / DEFAULT_EXPENSES，輸出完整 HTML
  const htmlSrc = document.documentElement.outerHTML;
  // 替換 TRIP_DAYS 資料區段
  const daysJson  = JSON.stringify(tripDays, null, 2);
  const expJson   = JSON.stringify(expenses, null, 2);
  // 用正則把 const TRIP_DAYS = [...]; 整段替換
  let out = htmlSrc
    .replace(/const TRIP_DAYS\s*=\s*\[[\s\S]*?\](?=\s*;)/, 'const TRIP_DAYS = ' + daysJson)
    .replace(/const DEFAULT_EXPENSES\s*=\s*\[[\s\S]*?\](?=\s*;)/, 'const DEFAULT_EXPENSES = ' + expJson);
  const blob = new Blob([out], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'busan_trip_' + new Date().toISOString().split('T')[0] + '.html';
  a.click();
  showToast('⬇️ HTML 已下載，上傳 GitHub 即可！');
}

function resetData() {
  if (!confirm('確定重設為初始資料？所有在 App 內的修改將遺失。')) return;
  tripDays  = JSON.parse(JSON.stringify(TRIP_DAYS));
  expenses  = JSON.parse(JSON.stringify(DEFAULT_EXPENSES));
  saveAll(); renderAll();
  showToast('♻️ 已重設為初始資料');
}

// ── 倒數計時 ──
function startCd() {
  if (cdInterval) clearInterval(cdInterval);
  cdInterval = setInterval(updateCd, 1000);
  updateCd();
}
function updateCd() {
  const diff = cdTarget - new Date();
  const el = document.getElementById('cdDigits');
  const fill = document.getElementById('cdFill');
  if (!el) return;
  if (diff <= 0) { el.textContent = '🎉 出發！'; el.style.color='var(--teal)'; if(fill)fill.style.width='0%'; return; }
  const days = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000).toString().padStart(2,'0');
  const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
  const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
  el.textContent = days > 0 ? `${days}天 ${h}:${m}:${s}` : `${h}:${m}:${s}`;
  if (fill) {
    const base = new Date('2026-01-01');
    const pct  = Math.max(0, Math.min(100, (diff / (cdTarget - base)) * 100));
    fill.style.width = pct + '%';
    fill.className = 'cd-fill' + (pct < 20 ? ' red' : pct < 50 ? ' yellow' : '');
  }
}
function showCdSettings() {
  const dt = cdTarget.toISOString().slice(0,16);
  showModal(`
    <div class="modal-handle"></div>
    <h2 style="font-weight:800;font-size:1rem;color:var(--text);margin-bottom:16px">⏱️ VBP 倒數設定</h2>
    <div><label class="form-label">目標時間</label>
      <input type="datetime-local" class="form-input" id="cdInp" value="${dt}"></div>
    <div class="flex gap-2 mt-4">
      <button class="btn btn-teal" style="flex:1" onclick="saveCd()">儲存</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">取消</button>
    </div>`);
}
function saveCd() {
  cdTarget = new Date(document.getElementById('cdInp').value);
  localStorage.setItem('bs_cd', cdTarget.toISOString());
  startCd(); closeModal(); showToast('⏱️ 倒數時間已更新');
}

// ── 動態時間高亮 ──
function highlightCurrentItem() {
  // 清除所有既有 .now
  document.querySelectorAll('.trip-card.now').forEach(c=>c.classList.remove('now'));

  const todayStr = new Date().toISOString().split('T')[0];
  const day = tripDays.find(d=>d.date===todayStr);
  if (!day || currentDay!==day.id) return;

  const now = new Date();
  const nowMin = now.getHours()*60+now.getMinutes();

  // 只取有 time 的項目，依時間排序
  const timed = day.items
    .filter(it=>it.time)
    .sort((a,b)=>{
      const [ah,am]=a.time.split(':').map(Number);
      const [bh,bm]=b.time.split(':').map(Number);
      return (ah*60+am)-(bh*60+bm);
    });

  if (!timed.length) return;

  // 找出「time 已過且下一個 time 未到」的項目
  let current = null;
  for (let i=0; i<timed.length; i++) {
    const [hh,mm]=timed[i].time.split(':').map(Number);
    const itemMin = hh*60+mm;
    const nextMin = i+1 < timed.length
      ? (()=>{ const [nh,nm]=timed[i+1].time.split(':').map(Number); return nh*60+nm; })()
      : Infinity;
    if (nowMin >= itemMin && nowMin < nextMin) { current = timed[i]; break; }
  }
  // 若早於第一個行程，高亮第一個
  if (!current && timed.length) {
    const [fh,fm]=timed[0].time.split(':').map(Number);
    if (nowMin < fh*60+fm) current = timed[0];
  }

  if (current) {
    const card=document.getElementById('card-'+current.id);
    if(card){card.classList.add('now');card.scrollIntoView({behavior:'smooth',block:'center'});}
  }
}

function scrollToCurrent() { highlightCurrentItem(); }

// ── 導覽 ──
function switchView(v) {
  currentView=v;
  const m={trip:'nav-trip',expenses:'nav-exp',fx:'nav-fx',offline:'nav-offline'};
  setNav(m[v]||'nav-trip');
  renderAll();
}
function setNav(id) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

// ── Modal ──
function showModal(html) {
  document.getElementById('modalContainer').innerHTML=`
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-box" id="modalBox">${html}</div>
    </div>`;
  // 只有「按下」和「放開」都在背景（overlay）上才關閉，滑動不觸發
  const overlay = document.getElementById('modalOverlay');
  let downOnOverlay = false;
  overlay.addEventListener('mousedown', e => { downOnOverlay = e.target === overlay; });
  overlay.addEventListener('mouseup',   e => { if (downOnOverlay && e.target === overlay) closeModal(); });
  overlay.addEventListener('touchstart', e => { downOnOverlay = e.target === overlay; }, {passive:true});
  overlay.addEventListener('touchend',   e => { if (downOnOverlay && e.target === overlay) closeModal(); });
}
function closeModal(){document.getElementById('modalContainer').innerHTML='';}

// ── Toast ──
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── 啟動 ──
init();

// 長按「💱」開啟離線資訊
document.addEventListener('DOMContentLoaded', () => {
  const fxBtn = document.getElementById('nav-fx');
  if (!fxBtn) return;
  let pressTimer;
  const startPress = () => { pressTimer = setTimeout(() => switchView('offline'), 600); };
  const endPress   = () => clearTimeout(pressTimer);
  fxBtn.addEventListener('touchstart', startPress);
  fxBtn.addEventListener('touchend',   endPress);
  fxBtn.addEventListener('mousedown',  startPress);
  fxBtn.addEventListener('mouseup',    endPress);
  fxBtn.title = '點擊：匯率換算 ｜ 長按：離線資訊';
});
</script>
